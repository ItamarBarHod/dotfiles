
set-option -g base-index 1

unbind r
unbind-key T
bind r source-file ~/.tmux.conf

set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm-256color:RGB"

set -g mouse on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# Copy, clear selection, stay in copy-mode (no jumping to bottom)
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# Enable automatic window renaming based on the current foreground process
set-option -g allow-rename off
set-option -g automatic-rename off

set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features ',xterm-256color:clipboard'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @tokyo-night-tmux_transparent 1
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'yellow'
set -g @prefix_highlight_prefix_prompt 'WAIT'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_sync_prompt 'SYNC'
set -g @plugin 'abhinav/tmux-fastcopy'
set -g @fastcopy-action 'pbcopy'
set -g @plugin 'schasse/tmux-jump'
set -g @jump-key 'j'
set -g @plugin 'AngryMorrocoy/tmux-neolazygit'
set -g @plugin 'brokenricefilms/tmux-fzf-session-switch'
set -g @fzf-goto-session 's'
set -g @fzf-goto-session-only 'true'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Smart Ctrl-l: clear screen if one pane, move right if multiple (must be after TPM)
is_one_pane="[ $(tmux list-panes | wc -l) -eq 1 ]"
bind -n C-l if-shell "$is_one_pane" "send-keys C-l" "select-pane -R"

# Refresh current session: restart nvim in window 1, source zshrc in zsh panes, skip claude
bind R run-shell "~/.tmux/scripts/refresh.sh"

# Override fzf-session-switch binding to center the popup
bind s run-shell "tmux display-popup -E -w 40% -h 40% '~/.tmux/scripts/session-switch.sh #{session_name}'"

# Override theme styles (must be after TPM)
set -g status-left "#{prefix_highlight}"
set -g window-status-current-format "#[fg=#7aa2f7,bg=#292e42,bold]   #I  #W   "
set -g window-status-format "#[fg=#545c7e,bg=default]   #I  #W   "
set -g window-status-separator "#[fg=#292e42]│"
set -g status-right "#(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#(~/.tmux/plugins/tokyo-night-tmux/src/path-widget.sh #{pane_current_path})"
set -g status-interval 60
